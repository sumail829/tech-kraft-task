services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: suman
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realestate
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suman -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 5